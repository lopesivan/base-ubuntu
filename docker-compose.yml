---
version: '3'
services:
  xpto-server:
    image: ${IMAGE}:${META_TAG}
    container_name: ${CONTAINER_NAME}
    hostname: ${HOSTNAME}
    working_dir: /home/${USER}
    # command: entrypoint.sh /opt/sdk/bin/sdk.sh
    ports: [8989:443]
    volumes:
      - ./system/opt/xpto-server:/opt/xpto-server
      - ./system/root/etc/services.d:/etc/services.d
      - ./home:/home/${USER}
    environment:
      - PUID=${UID}
      - PGID=${GID}
      - USER=${USER}
      - GROUP=${GROUP}
      - UID=${UID}
      - GID=${GID}
      - PORT=443
      - MESSAGE=Servidor XPTO respondendo pelo s6

